<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente para o ícone principal (Indigo para Cyan) -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" /> <!-- Indigo-500 -->
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" /> <!-- Cyan-500 -->
    </linearGradient>

    <!-- Sombra suave para profundidade -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo (Opcional - Remova se quiser fundo transparente) -->
  <rect width="200" height="200" rx="20" fill="#09090b" />

  <!-- Ícone Principal: Hexágono Estilizado com Vórtice -->
  <g transform="translate(100, 100)" filter="url(#dropShadow)">
    <!-- Hexágono Base (Contorno sutil) -->
    <path d="M0,-80 L69.28,-40 L69.28,40 L0,80 L-69.28,40 L-69.28,-40 Z"
          fill="none" stroke="#3f3f46" stroke-width="2" opacity="0.5"/>

    <!-- Elementos do Vórtice (Linhas Curvas Dinâmicas) -->
    <!-- Linha 1: Topo para Centro -->
    <path d="M0,-70 C20,-50 30,-20 0,0"
          fill="none" stroke="url(#iconGradient)" stroke-width="6" stroke-linecap="round" />

    <!-- Linha 2: Direita para Centro -->
    <path d="M60,-35 C40,-10 10,0 0,0"
          fill="none" stroke="url(#iconGradient)" stroke-width="6" stroke-linecap="round" opacity="0.8" />

    <!-- Linha 3: Esquerda para Centro -->
    <path d="M-60,-35 C-40,-10 -10,0 0,0"
          fill="none" stroke="url(#iconGradient)" stroke-width="6" stroke-linecap="round" opacity="0.8" />

    <!-- Núcleo Brilhante (Ponto Central) -->
    <circle cx="0" cy="0" r="8" fill="#ffffff" />
    <circle cx="0" cy="0" r="12" fill="none" stroke="#10b981" stroke-width="2" opacity="0.6" />
  </g>

  <!-- Texto "KAFFYN" abaixo do ícone -->
  <text x="100" y="165" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="bold" font-size="24" fill="#ffffff" text-anchor="middle" letter-spacing="2">
    KAFFYN
  </text>
</svg>
