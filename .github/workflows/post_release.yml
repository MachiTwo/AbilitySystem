name: 🚀 Post Release

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
      plugin_version:
        required: true
        type: string
      is_release:
        required: true
        type: boolean

jobs:
  delivery:
    name: 🚀 Final Delivery (GitHub Release)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Import dependency versions
        shell: bash
        run: |
          grep -v '^#' deps.env | grep -v '^$' >> "$GITHUB_ENV"

      - name: Download all matching Artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p out
          # Fetch all artifacts for the current run
          ARTIFACTS=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts)

          # Download all matching artifacts as raw ZIP
          echo $ARTIFACTS | jq -c '.artifacts[]' | while read i; do
            NAME=$(echo $i | jq -r '.name')
            ID=$(echo $i | jq -r '.id')

            # Filter by project prefix to only include relevant artifacts (e.g., ability-system+v0.1.0)
            if [[ "$NAME" == "${{ env.PROJECT_ID }}+v"* ]]; then
              FILENAME="$NAME"
              if [[ "$FILENAME" != *.zip ]]; then
                FILENAME="$FILENAME.zip"
              fi
              echo "Downloading artifact: $NAME as $FILENAME"
              gh api repos/${{ github.repository }}/actions/artifacts/$ID/zip > "out/$FILENAME"
            else
              echo "Skipping artifact: $NAME"
            fi
          done

      - name: List Artifacts for Verification
        shell: bash
        run: |
          echo "Files ready for delivery:"
          ls -R out/

      - name: Create GitHub Release
        if: inputs.is_release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ env.PROJECT_ID }} v${{ inputs.plugin_version }}
          body_path: release_note.md
          draft: false
          prerelease: false
          files: |
            out/*.zip
