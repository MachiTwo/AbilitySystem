name: ✅ Check All (Static & Version)

on:
  workflow_call:
    outputs:
      name-prefix:
        description: "The name prefix for builds"
        value: ${{ jobs.init-version.outputs.name-prefix }}
      plugin-version:
        description: "The version of the plugin"
        value: ${{ jobs.init-version.outputs.plugin-version }}

jobs:
  pre-commit:
    name: ⚙️ Pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Code style checks
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files

  init-version:
    name: 🏁 Init Version
    runs-on: ubuntu-latest
    outputs:
      name-prefix: ${{ steps.init.outputs.name-prefix }}
      plugin-version: ${{ steps.init.outputs.plugin-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - name: Init version vars
        id: init
        uses: ./.github/actions/init-version
